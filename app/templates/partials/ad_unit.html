{# Reusable AdSense ad unit with Sponsored label #}
{% if ad_slot %}
<section class="ad-section" aria-label="Sponsored advertisement">
    <div class="container">
        <p class="small text-muted text-uppercase mb-2" style="font-size: 0.7rem; letter-spacing: 0.05em;">Sponsored</p>
        <div class="ad-slot">
            <ins class="adsbygoogle"
                style="display:block"
                data-ad-client="ca-pub-YOUR_ID"
                data-ad-slot="{{ ad_slot }}"
                data-ad-format="auto"
                data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>
</section>
{% else %}
{# Fallback placeholder for development / before AdSense approval #}
<section class="ad-section" aria-label="Sponsored advertisement">
    <div class="container">
        <p class="small text-muted text-uppercase mb-2" style="font-size: 0.7rem; letter-spacing: 0.05em;">Sponsored</p>
        <div class="ad-slot">
            <span>Advertisement</span>
        </div>
    </div>
</section>
{% endif %}

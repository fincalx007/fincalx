{# Reusable AdSense ad unit with Sponsored label #}
{% if ad_slot %}
<section class="ad-section" aria-label="Sponsored advertisement">
    <div class="container">
        <p class="small text-muted text-uppercase mb-2 sponsored-label">Sponsored</p>
        <div class="ad-slot">
            <ins class="adsbygoogle"
                data-ad-client="ca-pub-7541563552796195"
                data-ad-slot="{{ ad_slot }}"
                data-ad-format="auto"
                data-full-width-responsive="true"></ins>
            <script nonce="{{ request.state.csp_nonce }}">(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>
</section>
{% else %}
{# Fallback placeholder for development / before AdSense approval #}
<section class="ad-section" aria-label="Sponsored advertisement">
    <div class="container">
        <p class="small text-muted text-uppercase mb-2 sponsored-label">Sponsored</p>
        <div class="ad-slot">
            <span>Advertisement</span>
        </div>
    </div>
</section>
{% endif %}

{% extends "base.html" %}

{% block content %}
<section class="section-pad">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="display-1 fw-bold text-secondary" aria-hidden="true">{{ status_code }}</div>
                <h1 class="h2 fw-bold mt-3 mb-3">{{ heading }}</h1>
                <p class="lead text-secondary mb-4">{{ message }}</p>
                <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
                    <a class="btn btn-gradient btn-lg px-4" href="/">
                        <i class="bi bi-house-door-fill me-2" aria-hidden="true"></i> Go Home
                    </a>
                    <a class="btn btn-outline-secondary btn-lg px-4" href="/tools/sip-calculator">
                        <i class="bi bi-calculator-fill me-2" aria-hidden="true"></i> Try a Calculator
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
